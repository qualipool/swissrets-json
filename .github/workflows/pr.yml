name: PR Action

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Lint and run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10.33.1
    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - run: pnpm install
    - run: pnpm run lint
    - run: pnpm run test

name: Sync schema to docs

on:
  push:
    branches: [main]
    paths:
      - 'schema/swissRetsSchema.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy schema to docs
        run: cp schema/swissRetsSchema.json docs/swissRetsSchema.json

      - name: Commit and push if changed
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          message: 'chore: sync schema to docs'
          add: 'docs/swissRetsSchema.json'
          default_author: github_actions

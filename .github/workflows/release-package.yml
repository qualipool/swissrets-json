name: Publish Package to github packages
on:
  workflow_dispatch:
    inputs:
      semver:
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]
        description: The semver of the release.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # Setup .npmrc file to publish to GitHub Packages
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          # Defaults to the user or organization that owns the workflow file
          scope: '@qualipool'
      - run: echo "github.event.inputs.semver ${{ github.event.inputs.semver }}"
      - name: Calculate next version based on semver input
        id: next_version
        uses: zwaldowski/semver-release-action@a6a8309186ccf60c52ea2463a723c78d3b924577 # v4
        with:
          dry_run: true
          per_branch: true
          bump: ${{ github.event.inputs.semver }}
          github_token: ${{ github.token }}
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
